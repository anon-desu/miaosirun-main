name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 因为你有了 package.json，直接 install 即可
      - name: Install Dependencies
        run: npm install

      # 因为你有了 capacitor.config.json，直接添加安卓平台并同步即可
      - name: Build Android App
        run: |
          npx cap add android
          npx cap sync android

      - name: Build APK using Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Miaosirun-Game-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
