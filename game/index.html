<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>阿祖喵斯快跑</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* 横屏提示遮罩（竖屏时显示） */
    #rotate-tip {
      display: none;
      position: fixed; 
      inset: 0; 
      z-index: 9999;
      background: #0a0a14;
      flex-direction: column;
      align-items: center; 
      justify-content: center;
      gap: 20px; 
      color: #e8e8ff; 
      font-family: sans-serif;
      text-align: center;
      pointer-events: all;
    }
    #rotate-tip.show { display: flex; }
    #rotate-tip .icon { font-size: 60px; animation: spin 1.5s ease-in-out infinite alternate; }
    @keyframes spin {
      from { transform: rotate(-30deg); }
      to   { transform: rotate(30deg);  }
    }
    #rotate-tip p { font-size: 1.1rem; color: #aaa; }
  </style>
</head>
<body>
  <div id="app">
    <div id="screen-start" class="screen active">
      <div class="start-content">
        <h1 class="game-title">阿祖喵斯快跑</h1>
        <p class="game-subtitle">AZU-NYAS RUN</p>
        
        <!-- 【新增】选人界面 (使用内联样式，不破坏原有CSS) -->
        <div id="char-select-container" style="display: none; align-items: center; justify-content: center; gap: 20px; margin-bottom: 30px;">
          <button id="btn-prev-char" style="background: transparent; border: 2px solid #00f0ff; color: #00f0ff; font-size: 24px; border-radius: 8px; cursor: pointer; padding: 5px 15px; font-weight: bold; box-shadow: 0 0 10px rgba(0,240,255,0.3);">&lt;</button>
          
          <div style="width: 100px; height: 100px; display: flex; align-items: center; justify-content: center; background: rgba(0,240,255,0.05); border: 1px solid #00f0ff; border-radius: 10px; box-shadow: 0 0 15px rgba(0,240,255,0.4) inset;">
            <img id="char-preview-img" src="" style="max-width: 80%; max-height: 80%; object-fit: contain; filter: drop-shadow(0 0 5px #00f0ff);">
          </div>
          
          <button id="btn-next-char" style="background: transparent; border: 2px solid #00f0ff; color: #00f0ff; font-size: 24px; border-radius: 8px; cursor: pointer; padding: 5px 15px; font-weight: bold; box-shadow: 0 0 10px rgba(0,240,255,0.3);">&gt;</button>
        </div>

        <button id="btn-start" class="btn-primary">开始游戏</button>
        <button id="btn-howto" class="btn-secondary">游戏说明</button>
      </div>
    </div>

    <div id="screen-howto" class="screen">
      <div class="howto-content">
        <h2>游戏说明</h2>
        <div class="howto-list">
          <div class="howto-item">
            <span class="icon">👆</span>
            <p>点击上方/下方区域消灭对应区域的怪物</p>
          </div>
          <div class="howto-item">
            <span class="icon">👻</span>
            <p><b>普通怪</b>：靠近时隐身，及时点击消灭</p>
          </div>
          <div class="howto-item">
            <span class="icon">☁️</span>
            <p><b>云雾怪</b>：云雾环绕，隐身前有明显提示</p>
          </div>
          <div class="howto-item">
            <span class="icon">💀</span>
            <p><b>Boss怪</b>：疯狂连击对应区域消耗血量</p>
          </div>
        </div>
        <button id="btn-back" class="btn-secondary">返回</button>
      </div>
    </div>

    <div id="screen-game" class="screen">
      <canvas id="gameCanvas"></canvas>
    </div>

    <div id="screen-gameover" class="screen">
      <div class="gameover-content">
        <h2 id="gameover-title">游戏结束</h2>
        <div class="score-display">
          <span class="label">最终得分</span>
          <span id="final-score" class="score-value">0</span>
        </div>
        <div class="score-display">
          <span class="label">最高连击</span>
          <span id="final-combo" class="score-value">0</span>
        </div>
        <button id="btn-restart" class="btn-primary">再来一局</button>
        <button id="btn-menu" class="btn-secondary">主菜单</button>
      </div>
    </div>
    
    <div id="buff-modal" class="screen">
      <div class="buff-container">
        <h2>🏆 击败 Boss 奖励</h2>
        <p>请选择一项能力加成：</p>
        <div class="buff-cards" id="buff-cards">
        </div>
      </div>
    </div>
  </div>

  <script src="js/assetLoader.js"></script>
  <script src="js/effects.js"></script>
  <script src="js/player.js"></script>
  <script src="js/monsters/normalMonster.js"></script>
  <script src="js/monsters/cloudMonster.js"></script>
  <script src="js/monsters/bossMonster.js"></script>
  <script src="js/ui.js"></script>
  <script src="buffs/buffManager.js"></script>
  <script src="js/game.js"></script>
  <script src="js/main.js"></script>

  <script>
    /**
     * 【新增】选人界面初始化逻辑
     * 这个函数会在 assetLoader.js 彻底加载完资源后被自动调用
     */
    window.initCharSelectUI = function() {
      const validPlayers = AssetLoader.getValidPlayers();
      const container = document.getElementById('char-select-container');
      const imgPreview = document.getElementById('char-preview-img');
      const btnPrev = document.getElementById('btn-prev-char');
      const btnNext = document.getElementById('btn-next-char');

      if (validPlayers.length === 0) validPlayers.push('player');

      let currentIndex = 0;
      window.selectedPlayerKey = validPlayers[currentIndex]; // 暴露给 game.js
      
      // 显示 UI 并应用第一张图
      imgPreview.src = AssetLoader.get(validPlayers[currentIndex]).src || 'assets/images/player/player.png';
      container.style.display = 'flex';

      // 绑定左右切换事件
      btnPrev.addEventListener('click', () => {
        currentIndex = (currentIndex - 1 + validPlayers.length) % validPlayers.length;
        window.selectedPlayerKey = validPlayers[currentIndex];
        imgPreview.src = AssetLoader.get(validPlayers[currentIndex]).src;
      });

      btnNext.addEventListener('click', () => {
        currentIndex = (currentIndex + 1) % validPlayers.length;
        window.selectedPlayerKey = validPlayers[currentIndex];
        imgPreview.src = AssetLoader.get(validPlayers[currentIndex]).src;
      });
    };

    /**
     * 原有：屏幕方向管理逻辑
     */
    (function() {
      const tip = document.getElementById('rotate-tip');
      const landscapeQuery = window.matchMedia("(orientation: landscape)");

      function handleOrientationChange(mql) {
        if (mql.matches) {
          tip.classList.remove('show');
          if (window.gameInstance && typeof window.gameInstance._resize === 'function') {
            window.gameInstance._resize();
          }
        } else {
          tip.classList.add('show');
        }
      }

      if (landscapeQuery.addEventListener) {
        landscapeQuery.addEventListener("change", handleOrientationChange);
      } else {
        landscapeQuery.addListener(handleOrientationChange);
      }
      handleOrientationChange(landscapeQuery);

      if (screen.orientation && screen.orientation.lock) {
        screen.orientation.lock('landscape').catch(() => {
          console.log("浏览器不支持或未开启全屏，无法锁定方向");
        });
      }
    })();
  </script>
</body>
</html>
